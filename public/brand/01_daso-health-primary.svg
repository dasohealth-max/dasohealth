    <rect x="51.5" y="-12" width="9" height="22" rx="1.5" fill="#EBF7EE"/>
    <rect x="45" y="-4.5" width="22" height="9" rx="1.5" fill="#EBF7EE"/>
  </g>

  <!-- Wordmark: DAS -->
  <text x="168" y="68" font-family="'Poppins'"
