<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160" role="img">
  <title>DAS Health â€” Primary Logo</title>
  <desc>DAS Health full horizontal lockup: eye-leaf icon with wordmark and tagline</desc>

  <!-- Icon group, left-anchored -->
  <g transform="translate(78, 80)">
    <!-- Eye outer fill -->
    <path d="M0,-36 C22,-36 58,-12 68,0 C58,12 22,36 0,36 C-22,36 -58,12 -68,0 C-58,-12 -22,-36 0,-36 Z"
          fill="#EBF7EE"/>
