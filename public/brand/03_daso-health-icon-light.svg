<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img">
  <title>DAS Health â€” Icon Mark Light</title>
  <desc>DAS Health standalone icon light variant: eye with leaf pupil on mint background</desc>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#EBF7EE"/>

  <!-- Eye outer tint area -->
  <path d="M100,64 C122,64 158,88 165,100 C158,112 122,136 100,136 C78,136 42,112 35,100 C42,88 78,64 100,64 Z"
